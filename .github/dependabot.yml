version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    commit-message:
      prefix: "feat(ai)"
    allow:
      - dependency-name: '@ai-sdk/*'
    groups:
      ai-sdk:
        patterns:
          - "@ai-sdk/*"

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'monthly'
    commit-message:
      prefix: "build"
